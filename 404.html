<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | F9XR Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #f0f0f0;
            --text-muted: #888;
            --accent: #ff3366;
            --card-bg: #111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sora', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            letter-spacing: -5px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            max-width: 400px;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            padding: 1rem 2rem;
            background: var(--accent);
            border-radius: 8px;
            transition: transform 0.2s;
        }

        a:hover {
            transform: scale(1.05);
        }

        footer {
            position: absolute;
            bottom: 0;
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--text-main);
            background: none;
            padding: 0;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
            transform: none;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">F9XR<span>.</span></div>
    </nav>

    <main>
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html">Go Home</a>
    </main>

    <footer>
        <a href="https://f9xr.github.io/" target="_blank">MADE BY F9XR TEAM</a>
    </footer>
</body>

</html>
