<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | RestoreX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f1f5f4;
    --dark: #0b1120;
    --card: #ffffff;
    --accent: #3b82f6;
    --success: #22c55e;
    --danger: #ef4444;
    --muted: #64748b;
}

body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.nav-inner {
    background: var(--dark);
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    gap: 15px;
}

.nav-inner a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
}

.logout-btn {
    background: var(--danger);
}

/* Layout */
.wrapper {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    font-family: 'Outfit', sans-serif;
}

/* Cards */
.card {
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
    margin-top: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* Premium Badge */
.premium {
    color: var(--success);
    font-weight: bold;
}

.not-premium {
    color: var(--danger);
    font-weight: bold;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
}

/* Buttons */
button {
    margin-top: 12px;
    padding: 12px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.secondary {
    background: #e2e8f0;
    color: black;
}

/* Settings toggle */
.toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-inner">
        <a href="/">Home</a>
        <a href="#" onclick="logout()" class="logout-btn">Logout</a>
    </div>
</div>

<div class="wrapper">
    <h1>Dashboard</h1>

    <!-- USER -->
    <div class="card">
        <h3>User Info</h3>
        <p id="userEmail">Loading...</p>
        <p id="discordUser">Discord: Not set</p>
    </div>

    <!-- PREMIUM -->
    <div class="card">
        <h3>Premium Status</h3>
        <p id="premiumStatus" class="not-premium">Not Premium</p>
    </div>

    <!-- REDEEM -->
    <div class="card">
        <h3>Redeem Code</h3>
        <input id="redeemCode" placeholder="Enter code">
        <button onclick="redeem()">Redeem</button>
        <p id="redeemMsg"></p>
    </div>

    <!-- DISCORD LINK -->
    <div class="card">
        <h3>Link Discord</h3>
        <input id="discordInput" placeholder="Discord Username">
        <button onclick="saveDiscord()">Save</button>
    </div>

    <!-- SETTINGS -->
    <div class="card">
        <h3>Settings</h3>

        <div class="toggle">
            <span>Show Email</span>
            <input type="checkbox" id="showEmailToggle">
        </div>

        <button class="secondary" onclick="saveSettings()">Save Settings</button>
    </div>

</div>

<script>
let userData = null;

async function checkAuth() {
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/RestoreX/login.html";
        return;
    }

    try {
        const res = await fetch("/api/me", {
            headers: { Authorization: "Bearer " + token }
        });

        if (res.status !== 200) {
            localStorage.removeItem("token");
            window.location.href = "/RestoreX/login.html";
            return;
        }

        const data = await res.json();
        userData = data.user;

        document.getElementById("userEmail").innerText =
            userData.showEmail === false ? "Email hidden" : "Email: " + userData.email;

        document.getElementById("discordUser").innerText =
            "Discord: " + (userData.discord || "Not set");

        document.getElementById("premiumStatus").innerText =
            userData.premium ? "Premium Active" : "Not Premium";

        document.getElementById("premiumStatus").className =
            userData.premium ? "premium" : "not-premium";

        document.getElementById("showEmailToggle").checked =
            userData.showEmail !== false;

    } catch {
        window.location.href = "/RestoreX/login.html";
    }
}

/* Redeem */
async function redeem() {
    const code = document.getElementById("redeemCode").value;

    const res = await fetch("/api/redeem", {
        method: "POST",
        headers: { "Content-Type": "application/json",
                   "Authorization": "Bearer " + localStorage.getItem("token") },
        body: JSON.stringify({ code })
    });

    const data = await res.json();
    document.getElementById("redeemMsg").innerText = data.message;

    checkAuth();
}

/* Save Discord */
async function saveDiscord() {
    const discord = document.getElementById("discordInput").value;

    await fetch("/api/user/update", {
        method: "POST",
        headers: { "Content-Type": "application/json",
                   "Authorization": "Bearer " + localStorage.getItem("token") },
        body: JSON.stringify({ discord })
    });

    checkAuth();
}

/* Settings */
async function saveSettings() {
    const showEmail = document.getElementById("showEmailToggle").checked;

    await fetch("/api/user/update", {
        method: "POST",
        headers: { "Content-Type": "application/json",
                   "Authorization": "Bearer " + localStorage.getItem("token") },
        body: JSON.stringify({ showEmail })
    });

    checkAuth();
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "/RestoreX/login.html";
}

checkAuth();
</script>

</body>
</html>
