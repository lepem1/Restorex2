<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | RestoreX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: #f1f5f4;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.nav-inner {
    background: #0b1120;
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    gap: 15px;
}

.nav-inner a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
}

.logout {
    background: #ef4444;
}

/* Content */
.container {
    max-width: 900px;
    margin: 50px auto;
    background: white;
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

h1 {
    font-family: 'Outfit', sans-serif;
}

.card {
    background: #f8fafc;
    padding: 20px;
    border-radius: 16px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-inner">
        <a href="/">Home</a>
        <a href="#" onclick="logout()" class="logout">Logout</a>
    </div>
</div>

<div class="container">
    <h1>Dashboard</h1>
    <p>Welcome to RestoreX panel</p>

    <div class="card">
        <h3>User Info</h3>
        <p id="userEmail">Loading...</p>
    </div>
</div>

<script>
// 🔐 Check login
async function checkAuth() {
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login.html";
        return;
    }

    const res = await fetch("/api/me", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (res.status !== 200) {
        localStorage.removeItem("token");
        window.location.href = "/login.html";
        return;
    }

    const data = await res.json();
    document.getElementById("userEmail").innerText = "Email: " + data.user.email;
}

checkAuth();

// 🚪 Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
}
</script>

</body>
</html>
