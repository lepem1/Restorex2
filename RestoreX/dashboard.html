<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | RestoreX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-light: #f1f5f4;
    --bg-dark: #0b1120;
    --text-muted: #64748b;
    --accent: #3b82f6;
}

body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: var(--bg-light);
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.nav-inner {
    background: var(--bg-dark);
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    gap: 15px;
}

.nav-inner a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
}

.nav-inner a:hover {
    background: rgba(255,255,255,0.1);
}

.logout-btn {
    background: #ef4444;
}

/* Content */
.wrapper {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 24px;
    width: 500px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

h1 {
    font-family: 'Outfit', sans-serif;
}

.card {
    background: #f8fafc;
    padding: 20px;
    border-radius: 16px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-inner">
        <a href="/">Home</a>
        <a href="#" onclick="logout()" class="logout-btn">Logout</a>
    </div>
</div>

<!-- Dashboard -->
<div class="wrapper">
    <div class="container">
        <h1>Dashboard</h1>
        <p>Welcome to RestoreX</p>

        <div class="card">
            <h3>User Info</h3>
            <p id="userEmail">Loading...</p>
        </div>
    </div>
</div>

<script>
//  Protect page
async function checkAuth() {
    const token = localStorage.getItem("token");

    //  No token
    if (!token) {
        window.location.href = "/RestoreX/login.html";
        return;
    }

    try {
        const res = await fetch("/api/me", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        //  Invalid token
        if (res.status !== 200) {
            localStorage.removeItem("token");
            window.location.href = "/RestoreX/login.html";
            return;
        }

        //  Valid user
        const data = await res.json();
        document.getElementById("userEmail").innerText =
            "Email: " + data.user.email;

    } catch {
        window.location.href = "/RestoreX/login.html";
    }
}

//  Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/RestoreX/login.html";
}

checkAuth();
</script>

</body>
</html>
