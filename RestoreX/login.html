<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | RestoreX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: #f1f5f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 40px;
    border-radius: 24px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    text-align: center;
}

/* Navbar (same style as index) */
.navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
}    
    
/* Title */
h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    margin-bottom: 10px;
}

p {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 999px;
    border: none;
    background: #3b82f6;
    color: white;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2563eb;
    transform: translateY(-2px);
}

/* Link */
a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
}

.msg {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-inner">
   <a href="/">Home</a>
<a href="/RestoreX/login.html">Login</a>
<a href="/RestoreX/register.html" class="login-btn">Register</a>
    </div>
</div>
    
<div class="container">
    <h1>Welcome Back</h1>
    <p>Login to your RestoreX account</p>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p>
        Don’t have an account?
        <a href="register.html">Register</a>
    </p>

    <div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();
    msg.innerText = data.message;

    if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard";
    }
};
</script>

</body>
</html>
