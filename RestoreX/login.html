<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | RestoreX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-light: #f1f5f4;
    --bg-dark: #0b1120;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --error: #ef4444;
    --success: #22c55e;
}

body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: var(--bg-light);
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.nav-inner {
    background: var(--bg-dark);
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    gap: 15px;
}

.nav-inner a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
}

.nav-inner a:hover {
    background: rgba(255,255,255,0.1);
}

.login-btn {
    background: var(--accent);
}

/* Layout */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 80px);
}

/* Card */
.container {
    background: white;
    padding: 40px;
    border-radius: 24px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    text-align: center;
}

h1 {
    font-family: 'Outfit', sans-serif;
}

p {
    color: var(--text-muted);
    font-size: 14px;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* Messages */
.msg {
    margin-top: 15px;
    font-size: 14px;
}

.error {
    color: var(--error);
}

.success {
    color: var(--success);
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-inner">
        <a href="/">Home</a>
        <a href="/RestoreX/login.html">Login</a>
        <a href="/RestoreX/register.html" class="login-btn">Register</a>
    </div>
</div>

<!-- Login -->
<div class="wrapper">
    <div class="container">
        <h1>Welcome Back</h1>
        <p>Login to your RestoreX account</p>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <p>
            Don’t have an account?
            <a href="/RestoreX/register.html">Register</a>
        </p>

        <div class="msg" id="msg"></div>
    </div>
</div>

<script>
const msg = document.getElementById("msg");

// 🔐 Login
document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();

    const emailVal = email.value.trim();
    const passwordVal = password.value.trim();

    // 🚫 Empty check
    if (!emailVal || !passwordVal) {
        msg.innerText = "Please fill all fields";
        msg.className = "msg error";
        return;
    }

    try {
        const res = await fetch("/api/login", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                email: emailVal,
                password: passwordVal
            })
        });

        const data = await res.json();

        // ❌ Invalid account handling
        if (!res.ok || !data.token) {
            msg.innerText = data.message || "Invalid account";
            msg.className = "msg error";
            return;
        }

        // ✅ Success
        msg.innerText = "Login successful!";
        msg.className = "msg success";

        localStorage.setItem("token", data.token);

        setTimeout(() => {
            window.location.href = "/dashboard.html";
        }, 800);

    } catch (err) {
        msg.innerText = "Server error. Try again.";
        msg.className = "msg error";
    }
};

// 🔁 Auto-login check
const token = localStorage.getItem("token");
if (token) {
    fetch("/api/me", {
        headers: { "Authorization": "Bearer " + token }
    }).then(res => {
        if (res.status === 200) {
            window.location.href = "/dashboard.html";
        }
    });
}
</script>

</body>
</html>
