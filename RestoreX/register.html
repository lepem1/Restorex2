<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | RestoreX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-light: #f1f5f4;
    --bg-dark: #0b1120;
    --text-dark: #0f172a;
    --text-muted: #64748b;
    --accent: #3b82f6;
}

/* Base */
body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: var(--bg-light);
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.nav-inner {
    background: var(--bg-dark);
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    gap: 15px;
}

.nav-inner a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
}

.nav-inner a:hover {
    background: rgba(255,255,255,0.1);
}

.login-btn {
    background: var(--accent);
}

/* Center */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 80px);
}

/* Card */
.container {
    background: white;
    padding: 40px;
    border-radius: 24px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    text-align: center;
}

/* Verify UI animation */
.fade {
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-family: 'Outfit', sans-serif;
    margin-bottom: 10px;
}

p {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.secondary-btn {
    background: #e2e8f0;
    color: #0f172a;
    margin-top: 10px;
}

.secondary-btn:hover {
    background: #cbd5f5;
}

.msg {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-inner">
        <a href="/">Home</a>
        <a href="/RestoreX/login.html">Login</a>
        <a href="/RestoreX/register.html" class="login-btn">Register</a>
    </div>
</div>

<div class="wrapper">

    <!-- REGISTER UI -->
    <div class="container fade" id="registerUI">
        <h1>Create Account</h1>
        <p>Join RestoreX security platform</p>

        <form id="registerForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

        <div class="msg" id="msg"></div>
    </div>

    <!-- VERIFY UI -->
    <div class="container fade" id="verifyUI" style="display:none;">
        <h1>📧 Check your email</h1>

        <p>
            A verification link has been sent to:<br>
            <b id="userEmail"></b>
        </p>

        <p>Please verify your account before logging in.</p>

        <p style="font-size:12px;color:gray;">
            Didn’t receive it? Check your spam folder.
        </p>

        <button onclick="resendEmail()">Resend Email</button>
        <button class="secondary-btn" onclick="goLogin()">Go to Login</button>

        <div class="msg" id="resendMsg"></div>
    </div>

</div>

<script>
const form = document.getElementById("registerForm");
const registerUI = document.getElementById("registerUI");
const verifyUI = document.getElementById("verifyUI");

form.onsubmit = async (e) => {
    e.preventDefault();

    const userEmail = email.value;

    const res = await fetch("/api/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: userEmail,
            password: password.value
        })
    });

    const data = await res.json();
    msg.innerText = data.message;

    if (data.success) {
        registerUI.style.display = "none";
        verifyUI.style.display = "block";
        document.getElementById("userEmail").innerText = userEmail;
    }
};

async function resendEmail() {
    const email = document.getElementById("userEmail").innerText;

    const res = await fetch("/api/resend-verification", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email })
    });

    document.getElementById("resendMsg").innerText = "Email sent again!";
}

function goLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
