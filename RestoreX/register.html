<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | RestoreX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f1f5f4;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #3b82f6;
    --error: #ef4444;
    --success: #22c55e;
}

body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
}

.navbar {
    display: flex;
    justify-content: center;
    padding: 20px;
}

.nav-inner {
    background: #0b1120;
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    gap: 12px;
}

.nav-inner a {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
}

.nav-inner a:hover {
    background: rgba(255,255,255,0.1);
}

.login-btn {
    background: var(--accent);
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 80px);
}

.container {
    background: var(--card);
    padding: 40px;
    border-radius: 24px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    text-align: center;
    animation: fade 0.4s ease;
}

@keyframes fade {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-family: 'Outfit', sans-serif;
    margin-bottom: 10px;
}

p {
    color: var(--muted);
    font-size: 14px;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: var(--accent);
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.msg {
    margin-top: 15px;
    font-size: 14px;
}

.error { color: var(--error); }
.success { color: var(--success); }
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-inner">
        <a href="/">Home</a>
        <a href="/RestoreX/login.html">Login</a>
        <a href="/RestoreX/register.html" class="login-btn">Register</a>
    </div>
</div>

<div class="wrapper">
    <div class="container">
        <h1>Create Account</h1>
        <p>Start using RestoreX</p>

        <form id="registerForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required>
            <button type="submit">Create Account</button>
        </form>

        <p style="margin-top:15px;">
            Already have an account?
            <a href="/RestoreX/login.html">Login</a>
        </p>

        <div class="msg" id="msg"></div>
    </div>
</div>

<script>
const form = document.getElementById("registerForm");
const msg = document.getElementById("msg");

form.onsubmit = async (e) => {
    e.preventDefault();

    const emailVal = email.value.trim();
    const passVal = password.value.trim();

    if (!emailVal || !passVal) {
        msg.innerText = "Please fill all fields";
        msg.className = "msg error";
        return;
    }

    try {
        const res = await fetch("/api/register", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                email: emailVal,
                password: passVal
            })
        });

        let data;
        try {
            data = await res.json();
        } catch {
            data = { message: "Server error" };
        }

        if (!res.ok) {
            msg.innerText = data.message || "Registration failed";
            msg.className = "msg error";
            return;
        }

        msg.innerText = "Account created successfully!";
        msg.className = "msg success";

        setTimeout(() => {
            window.location.href = "/RestoreX/login.html";
        }, 1000);

    } catch {
        msg.innerText = "Server offline";
        msg.className = "msg error";
    }
};
</script>

</body>
</html>
